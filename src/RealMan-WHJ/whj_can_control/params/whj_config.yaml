/**:
  ros__parameters:
    # CAN interface configuration
    # ⚠️ 注意：can_name 会被 launch 文件动态覆盖，此默认值仅作为回退
    can_name: "can1"        # 默认回退值，实际由 launch 文件通过 /tmp/can_usbcanfd.iface 动态分配
    canfd_enabled: true     # Enable CAN-FD mode
    
    # WHJ device configuration
    device_id: 1            # WHJ device CAN ID
    heartbeat_interval: 100 # Heartbeat interval in ms
    
    # Position limits (mm)
    min_position: 0.0
    max_position: 500.0
    
    # Speed limits (mm/s)
    max_speed: 100.0
